services:
  - type: web
    name: smartchat-api
    env: docker              # ← use Docker runtime, not node
    region: oregon
    plan: standard           # 2GB RAM minimum for Mistral 7B
    healthCheckPath: /health

    # Persist Ollama model cache — avoids re-downloading 4GB on every deploy
    disk:
      name: ollama-models
      mountPath: /root/.ollama
      sizeGB: 10

    envVars:
      - key: MODEL
        value: mistral
      - key: OLLAMA_URL
        value: http://127.0.0.1:11434
      - key: RATE_LIMIT_RPM
        value: "20"
      - key: RAPIDAPI_PROXY_SECRET
        sync: false
      - key: DIRECT_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
